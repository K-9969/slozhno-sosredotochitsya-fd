<html>
  <head>
    <style>
      .div {
        position: relative;
        display: grid;
        width: 700px;
        height: 700px;
        min-height: 700px;
        box-sizing: border-box;
        background-color: black;
      }
      .div1 {
        margin-top: 25px;
        padding-bottom: 23px;
      }
      
      .div2 {
        padding-inline-end: 45px;
      }
      .div::after{
        content: '';
        position: absolute;
        place-self: start end;
        display: block;
        width: 25px;
        height: 25px;
        border-top: 1px solid #f00;
        border-right: 1px solid #f00;
      }
      .div::before{
        content: '';
        position: absolute;
        place-self: end start;
        display: block;
        width: 25px;
        height: 25px;
        border-bottom: 1px solid #f00;
        border-left: 1px solid #f00;
      }
    </style>
  </head>
  <body>
    <div class="div1 div"></div>
    <div class="div2 div"></div>
  </body>
</html>
